<!DOCTYPE html>
<html>
<head><title>Регистрация</title></head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4f8;
        margin: 0;
        padding: 20px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }
    h1 {
        color: #332;
        text-align: center;
    }
    form {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    input[type=text] {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 97%;
    }
    button {
        background-color: #007BFF;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    button:hover {
        background-color: #0056b3;
    }
</style>
<body>
<h2>Регистрация</h2>
{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
<form method="post">
  Имя пользователя: <input type="text" name="username" required><br>
  Пароль: <input type="text" name="password" required><br>
  <button type="submit">Зарегистрироваться</button>
</form>
<p>Уже зарегистрированы? <a href="{{ url_for('login') }}">Войти</a></p>
</body>
</html>
